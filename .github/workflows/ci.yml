name: CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  nx-workspace:
    name: Nx Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Nx affected to compare commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive appropriate SHAs for base and head for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run checks on affected projects (lint, test, build)
        run: npx nx affected -t lint test build

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ai_service: ${{ steps.filter.outputs.ai_service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ai_service:
              - 'services/ai-service/**'

  ai-service:
    name: AI Service CI
    needs: changes
    if: ${{ needs.changes.outputs.ai_service == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r services/ai-service/requirements.txt

      - name: Syntax Check
        run: python -m py_compile services/ai-service/*.py services/ai-service/service/*.py
