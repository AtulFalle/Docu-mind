name: DocuMind CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  packages: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  REGISTRY: ghcr.io

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: nx affected:lint
        run: npx nx affected -t lint --parallel=3

      - name: nx affected:test
        run: npx nx affected -t test --parallel=3

      - name: nx affected:build
        run: npx nx affected -t build --parallel=3

  cd:
    name: Deployment (Docker)
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # User defined list of apps to deploy.
        # Could be automated with: npx nx show projects --affected --base=origin/master~1
        project: [api, ai-service] 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Check if affected
        id: check_affected
        run: |
          AFFECTED=$(npx nx show projects --affected --base=origin/master~1 --head=HEAD | grep -w ${{ matrix.project }} || echo "")
          if [ -n "$AFFECTED" ]; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        if: steps.check_affected.outputs.affected == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          # Use different dockerfile for different projects if needed
          file: ${{ matrix.project == 'ai-service' && 'services/ai-service/dockerfile' || 'docker/Dockerfile.nestjs' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PROJECT_NAME=${{ matrix.project }}
          cache-from: type=gha
          cache-to: type=gha,max
