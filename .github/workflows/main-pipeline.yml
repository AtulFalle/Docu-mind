name: Main Development Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  packages: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  REGISTRY: ghcr.io

jobs:
  # JOB 1: CI Pipeline (Quality Checks)
  ci-quality-checks:
    name: "CI: Standard Workspace Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Node Modules
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          # Caching node_modules in the root
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies (Workspace)
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs
        uses: nrwl/nx-set-shas@v4

      - name: "Run checks: Lint, Test, Build (Affected Only)"
        run: npx nx affected -t lint test build --parallel=3

  # JOB 2: AI Service Validation (Python)
  ci-ai-service-check:
    name: "CI: AI Service Syntax"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install AI Dependencies
        run: |
          if [ -f services/ai-service/requirements.txt ]; then
            pip install -r services/ai-service/requirements.txt
          fi

      - name: Python Syntax Validation
        run: |
          # Only check if files exist
          if [ -d services/ai-service ]; then
            python -m py_compile services/ai-service/*.py services/ai-service/service/*.py || echo "Some files missing, skipping compile check"
          fi

  # JOB 3: CD Pipeline (Docker Publish)
  cd-docker-publish:
    name: "CD: Containerize & Push"
    needs: [ci-quality-checks, ci-ai-service-check]
    # Only run on main/master push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define the core deployable services here
        project: [api, ai-service] 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Node Modules
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Check if affected
        id: check_affected
        run: |
          # Use nx show projects to see if the project was affected by the changes
          AFFECTED=$(npx nx show projects --affected --base=origin/master~1 --head=HEAD | grep -w ${{ matrix.project }} || echo "")
          if [ -n "$AFFECTED" ]; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        if: steps.check_affected.outputs.affected == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project }}
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - name: Build and Push
        if: steps.check_affected.outputs.affected == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          # Routing to the correct Dockerfile
          file: ${{ matrix.project == 'ai-service' && 'services/ai-service/dockerfile' || 'docker/Dockerfile.nestjs' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PROJECT_NAME=${{ matrix.project }}
          cache-from: type=gha
          cache-to: type=gha,max
