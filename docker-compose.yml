services:

  api:
    build:
      context: .
      dockerfile: ./apps/backend/api/dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - qdrant
      - redis
      - minio
      - ollama
    networks:
      - documind-net

  web:
    build:
      context: .
      dockerfile: ./apps/web-ui/documind-ui/.dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - documind-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - documind-net

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - documind-net

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - documind-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - documind-net

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - documind-net
  vault:
    image: hashicorp/vault:1.15
    container_name: documind-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./vault:/vault/config
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - documind-net

  clamav:
    image: clamav/clamav:latest
    container_name: documind-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - documind-net

  prometheus:
    image: prom/prometheus:latest
    container_name: documind-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - documind-net
  grafana:
    image: grafana/grafana:latest
    container_name: documind-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - documind-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: documind-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - documind-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: documind-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - documind-net
  node-exporter:
    image: prom/node-exporter
    container_name: documind-node-exporter
    ports:
      - "9100:9100"
    networks:
      - documind-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: documind-cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - documind-net

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: documind-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    networks:
      - documind-net

  mongo-exporter:
    image: bitnami/mongodb-exporter
    container_name: documind-mongo-exporter
    ports:
      - "9216:9216"
    environment:
      MONGODB_URI: mongodb://mongo:27017
    networks:
      - documind-net

  loki:
    image: grafana/loki:latest
    container_name: documind-loki
    ports:
      - "3100:3100"
    networks:
      - documind-net
  promtail:
    image: grafana/promtail:2.9.0
    container_name: documind-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - documind-net
  ai-service:
    build:
      context: ./services/ai-service
    container_name: documind-ai-service
    depends_on:
      - rabbitmq
      - qdrant
      - minio
      - ollama
      - mongo
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      MINIO_HOST: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      OLLAMA_URL: http://ollama:11434
      COLLECTION_NAME: documents
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: documind
    networks:
      - documind-net
  transcription-worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.whisper
    container_name: transcription-worker
    volumes:
      - transcription-data:/transcription
      - ./data:/data
    working_dir: /app
    command: ["npm", "run", "start:transcript"]
    depends_on:
      - rabbitmq
      - minio
      - mongo
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/documind
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    networks:
      - documind-net

volumes:
  mongo-data:
  qdrant-data:
  minio-data:
  ollama-data:
  vault-data:
  clamav-data:
  grafana-data:
  rabbitmq-data:
  transcription-data:

networks:
  documind-net:
    driver: bridge