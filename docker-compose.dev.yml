services:
  mongo:
    image: mongo:7
    container_name: documind-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - documind-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: documind-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - documind-net

  minio:
    image: minio/minio:latest
    container_name: documind-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - documind-net

  vault:
    image: hashicorp/vault:1.15
    container_name: documind-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./vault:/vault/config
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - documind-net

  clamav:
    image: clamav/clamav:latest
    container_name: documind-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "clamd", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management
    container_name: documind-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai-service
    container_name: documind-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      mongo:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      MINIO_HOST: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      OLLAMA_URL: http://host.docker.internal:11434
      COLLECTION_NAME: documents
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: documind
    networks:
      - documind-net
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - documind-net

  api:
    build:
      context: .
      dockerfile: ./apps/backend/api/dockerfile.dev
    container_name: documind-api-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: development
      NX_DAEMON: "false"
      MONGO_URI: mongodb://mongo:27017/documind
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    networks:
      - documind-net

  web-ui:
    build:
      context: .
      dockerfile: ./apps/web-ui/documind-ui/dockerfile.dev
    container_name: documind-web-ui-dev
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      NODE_ENV: development
      API_TARGET: http://api:3000
    networks:
      - documind-net
  
  transcription-worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.whisper
    container_name: transcription-worker
    volumes:
      - transcription-data:/transcription
      - ./data:/data
      - .:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      - rabbitmq
      - minio
      - mongo
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/documind
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: ["npm", "run", "start:transcript"]
    networks:
      - documind-net

volumes:
  mongo-data:
  qdrant-data:
  minio-data:
  vault-data:
  clamav-data:
  rabbitmq-data:
  ollama-data:
  transcription-data:

networks:
  documind-net:
    driver: bridge
